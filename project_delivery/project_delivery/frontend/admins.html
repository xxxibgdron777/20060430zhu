<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据管理后台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #F2F2F7;
  --white: #FFFFFF;
  --gray-secondary: #E5E5EA;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --green: #34C759;
  --red: #FF3B30;
  --blue: #007AFF;
  --orange: #FF9500;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  line-height: 1.5; 
}

/* Login */
.login-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.login-box {
  background: var(--white);
  padding: 40px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 360px;
  text-align: center;
}
.login-box h2 { margin-bottom: 24px; color: var(--text); }
.login-box input {
  width: 100%; padding: 12px 16px;
  border: 1px solid var(--gray-secondary);
  border-radius: var(--radius-sm);
  font-size: 15px;
  margin-bottom: 16px;
}
.login-box button {
  width: 100%; padding: 12px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  cursor: pointer;
}
.login-box button:hover { background: #0056b3; }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; }

/* Layout */
.admin-container { display: none; min-height: 100vh; }
.admin-container.active { display: flex; }

/* Sidebar */
.sidebar {
  width: 220px;
  background: var(--white);
  border-right: 1px solid var(--gray-secondary);
  padding: 20px 0;
}
.sidebar-brand {
  padding: 0 20px 20px;
  font-size: 18px;
  font-weight: 700;
  border-bottom: 1px solid var(--gray-secondary);
  margin-bottom: 16px;
}
.sidebar-brand i { color: var(--blue); margin-right: 10px; }
.sidebar-menu { list-style: none; }
.sidebar-menu li {
  padding: 12px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text2);
  transition: all 0.2s;
}
.sidebar-menu li:hover { background: var(--bg); color: var(--text); }
.sidebar-menu li.active { 
  background: var(--blue); 
  color: white;
}
.sidebar-menu li i { width: 20px; text-align: center; }

/* Main Content */
.main-content { flex: 1; padding: 24px; overflow: auto; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.header h1 { font-size: 24px; font-weight: 600; }
.header-actions { display: flex; gap: 12px; }
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: #0056b3; }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: #2db14e; }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #d63026; }
.btn-secondary { background: var(--gray-secondary); color: var(--text); }

/* Table */
.table-container {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.table-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--gray-secondary);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.table-header h3 { font-size: 16px; font-weight: 600; }
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.data-table th {
  background: var(--bg);
  padding: 12px 16px;
  text-align: left;
  font-weight: 600;
  color: var(--text2);
  border-bottom: 1px solid var(--gray-secondary);
}
.data-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-secondary);
}
.data-table tr:hover { background: rgba(0,122,255,0.05); }
.data-table tr:last-child td { border-bottom: none; }
.table-actions { display: flex; gap: 8px; }
.table-actions button {
  padding: 6px 12px;
  font-size: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.btn-edit { background: var(--blue); color: white; }
.btn-delete { background: var(--red); color: white; }

/* Checkbox */
.checkbox-col { width: 40px; text-align: center; }
.checkbox-col input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}
.batch-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

/* Pagination */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  gap: 8px;
}
.pagination button {
  padding: 8px 14px;
  border: 1px solid var(--gray-secondary);
  background: var(--white);
  border-radius: 6px;
  cursor: pointer;
}
.pagination button:hover { background: var(--bg); }
.pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
.pagination span { color: var(--text2); }

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 600px;
  max-height: 90vh;
  overflow: auto;
}
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--gray-secondary);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h3 { font-size: 18px; }
.modal-close {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--text2);
}
.modal-body { padding: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  margin-bottom: 6px;
  font-size: 14px;
  font-weight: 500;
}
.form-group input,
.form-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--gray-secondary);
  border-radius: var(--radius-sm);
  font-size: 14px;
}
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--gray-secondary);
  display: flex;
  justify-content: flex-end;
  gap: 12px;
}

/* Search */
.search-box {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}
.search-box input {
  flex: 1;
  padding: 10px 16px;
  border: 1px solid var(--gray-secondary);
  border-radius: var(--radius-sm);
  font-size: 14px;
}

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--white);
  padding: 20px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.stat-card h4 {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 8px;
}
.stat-card .value {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text2);
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  color: white;
  font-size: 14px;
  z-index: 1001;
  display: none;
}
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2><i class="fas fa-lock"></i> 管理后台登录</h2>
    <input type="password" id="passwordInput" placeholder="请输入密码" onkeypress="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Admin Container -->
<div class="admin-container" id="adminContainer">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <i class="fas fa-cog"></i> 数据管理
    </div>
    <ul class="sidebar-menu">
      <li class="active" onclick="switchSheet('product')" data-sheet="product">
        <i class="fas fa-box"></i> 产品数据
      </li>
      <li onclick="switchSheet('team')" data-sheet="team">
        <i class="fas fa-users"></i> 创业团队
      </li>
      <li onclick="switchSheet('budget')" data-sheet="budget">
        <i class="fas fa-chart-line"></i> 预算对比
      </li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="header">
      <h1 id="pageTitle">产品数据管理</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openModal()">
          <i class="fas fa-plus"></i> 新增数据
        </button>
        <button class="btn btn-success" onclick="triggerImport()">
          <i class="fas fa-file-import"></i> 批量导入
        </button>
        <button class="btn btn-danger" id="batchDeleteBtn" onclick="batchDelete()" style="display:none">
          <i class="fas fa-trash"></i> 批量删除 (<span id="selectedCount">0</span>)
        </button>
        <button class="btn btn-secondary" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> 退出
        </button>
      </div>
      <!-- 隐藏的文件上传输入框 -->
      <input type="file" id="importFileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFileImport(this)">
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <h4>总记录数</h4>
        <div class="value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <h4>总收入(万元)</h4>
        <div class="value" id="statIncome">0</div>
      </div>
      <div class="stat-card">
        <h4>总支出(万元)</h4>
        <div class="value" id="statExpense">0</div>
      </div>
      <div class="stat-card">
        <h4>总结余(万元)</h4>
        <div class="value" id="statBalance">0</div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索关键词..." oninput="handleSearch()">
      <button class="btn btn-secondary" onclick="loadData()">
        <i class="fas fa-sync-alt"></i> 刷新
      </button>
    </div>

    <!-- Table -->
    <div class="table-container">
      <div class="table-header">
        <h3 id="tableTitle">产品数据列表</h3>
        <span id="recordCount" style="color: var(--text2); font-size: 13px;">共 0 条</span>
      </div>
      <div id="tableWrapper">
        <div class="loading">加载中...</div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">新增数据</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- Dynamic form fields -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveData()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API_BASE = 'http://43.156.129.176';
const ADMIN_PASSWORD = 'a1b2';

let currentSheet = 'product';
let currentData = [];
let currentPage = 1;
let pageSize = 20;
let totalCount = 0;
let editingId = null;
let selectedIds = new Set();

// Sheet configurations
const sheetConfig = {
  product: {
    title: '产品数据管理',
    tableTitle: '产品数据列表',
    api: '/api/admin/product',
    columns: [
      { key: '年', label: '年', type: 'number' },
      { key: '月', label: '月', type: 'number' },
      { key: '业务板块', label: '业务板块', type: 'text' },
      { key: '产品', label: '产品', type: 'text' },
      { key: '项目', label: '项目', type: 'text' },
      { key: '收入', label: '收入', type: 'number' },
      { key: '支出', label: '支出', type: 'number' },
      { key: '平台管理费', label: '平台管理费', type: 'number' },
      { key: '损益', label: '损益', type: 'number' },
    ]
  },
  team: {
    title: '创业团队管理',
    tableTitle: '创业团队数据列表',
    api: '/api/admin/team',
    columns: [
      { key: '年', label: '年', type: 'number' },
      { key: '月', label: '月', type: 'number' },
      { key: 'H团队线性质', label: '团队线性质', type: 'text' },
      { key: 'H团队线-上级', label: '团队线上级', type: 'text' },
      { key: '核算单元', label: '核算单元', type: 'text' },
      { key: '收支1', label: '收支', type: 'text' },
      { key: '资金流向', label: '资金流向', type: 'text' },
      { key: '金额g', label: '金额', type: 'number' },
    ]
  },
  budget: {
    title: '预算对比管理',
    tableTitle: '预算对比数据列表',
    api: '/api/admin/budget',
    columns: [
      { key: '月份', label: '月份', type: 'number' },
      { key: '团队', label: '团队', type: 'text' },
      { key: '预算收入', label: '预算收入', type: 'number' },
      { key: '预算支出', label: '预算支出', type: 'number' },
      { key: '实际收入', label: '实际收入', type: 'number' },
      { key: '实际支出', label: '实际支出', type: 'number' },
    ]
  }
};

// Login
function doLogin() {
  const pwd = document.getElementById('passwordInput').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('adminContainer').classList.add('active');
    loadData();
  } else {
    document.getElementById('loginError').textContent = '密码错误';
  }
}

function logout() {
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('adminContainer').classList.remove('active');
}

// Switch Sheet
function switchSheet(sheet) {
  currentSheet = sheet;
  currentPage = 1;
  editingId = null;
  selectedIds.clear();
  
  // Update sidebar
  document.querySelectorAll('.sidebar-menu li').forEach(li => {
    li.classList.toggle('active', li.dataset.sheet === sheet);
  });
  
  // Update titles
  const config = sheetConfig[sheet];
  document.getElementById('pageTitle').textContent = config.title;
  document.getElementById('tableTitle').textContent = config.tableTitle;
  
  loadData();
}

// Load Data (服务端分页)
async function loadData(page) {
  if (page) currentPage = page;
  const config = sheetConfig[currentSheet];
  const wrapper = document.getElementById('tableWrapper');
  wrapper.innerHTML = '<div class="loading">加载中...</div>';
  selectedIds.clear();
  updateBatchDeleteBtn();
  
  const params = new URLSearchParams({
    page: currentPage,
    page_size: pageSize
  });
  const searchTerm = document.getElementById('searchInput').value.trim();
  if (searchTerm) params.set('keyword', searchTerm);
  
  try {
    const res = await fetch(API_BASE + config.api + '?' + params.toString());
    const result = await res.json();
    
    if (result.success) {
      currentData = result.data || [];
      totalCount = result.total || 0;
      renderTable();
      updateStats();
    } else {
      showToast(result.message || '加载失败', 'error');
    }
  } catch (e) {
    showToast('网络错误: ' + e.message, 'error');
  }
}

// Render Table
function renderTable() {
  const config = sheetConfig[currentSheet];
  
  // 数据已由服务端过滤和分页，直接渲染
  const total = totalCount;
  const totalPages = Math.ceil(total / pageSize) || 1;
  
  document.getElementById('recordCount').textContent = `共 ${total} 条，第 ${currentPage}/${totalPages} 页`;
  
  // Build table
  let html = '<table class="data-table"><thead><tr>';
  // Add checkbox header for product sheet
  if (currentSheet === 'product') {
    html += '<th class="checkbox-col"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>';
  }
  config.columns.forEach(col => {
    html += `<th>${col.label}</th>`;
  });
  html += '<th>操作</th></tr></thead><tbody>';
  
  currentData.forEach((row) => {
    const realIdx = row._idx;
    const isSelected = selectedIds.has(realIdx);
    html += '<tr>';
    // Add checkbox for product sheet
    if (currentSheet === 'product') {
      html += `<td class="checkbox-col"><input type="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleSelect(${realIdx})"></td>`;
    }
    config.columns.forEach(col => {
      let val = row[col.key];
      if (val === null || val === undefined) val = '';
      // Add unit for 结余 column in team sheet
      if (currentSheet === 'team' && col.key === '金额g' && val !== '') {
        val = val + ' 万元';
      }
      html += `<td>${val}</td>`;
    });
    html += `
      <td class="table-actions">
        <button class="btn-edit" onclick="editData(${realIdx})">编辑</button>
        <button class="btn-delete" onclick="deleteData(${realIdx})">删除</button>
      </td>
    </tr>`;
  });
  
  html += '</tbody></table>';
  
  if (currentData.length === 0) {
    html = '<div class="loading">暂无数据</div>';
  }
  
  document.getElementById('tableWrapper').innerHTML = html;
  renderPagination(totalPages);
}

// Render Pagination
function renderPagination(totalPages) {
  let html = '';
  html += `<button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
  html += `<span>第 ${currentPage} / ${totalPages || 1} 页</span>`;
  html += `<button onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(page) {
  if (page < 1) return;
  loadData(page);
}

// Update Stats
function updateStats() {
  let totalIncome = 0, totalExpense = 0;
  
  currentData.forEach(row => {
    if (currentSheet === 'product') {
      totalIncome += parseFloat(row['收入'] || 0);
      totalExpense += parseFloat(row['支出'] || 0);
    } else if (currentSheet === 'budget') {
      totalIncome += parseFloat(row['预算收入'] || 0);
      totalExpense += parseFloat(row['预算支出'] || 0);
    }
  });
  
  const balance = totalIncome - totalExpense;
  
  document.getElementById('statTotal').textContent = currentData.length;
  document.getElementById('statIncome').textContent = (totalIncome / 10000).toFixed(2);
  document.getElementById('statExpense').textContent = (totalExpense / 10000).toFixed(2);
  document.getElementById('statBalance').textContent = (balance / 10000).toFixed(2);
}

// Search
function handleSearch() {
  currentPage = 1;
  loadData(1);
}

// Checkbox functions
function toggleSelect(index) {
  if (selectedIds.has(index)) {
    selectedIds.delete(index);
  } else {
    selectedIds.add(index);
  }
  updateBatchDeleteBtn();
}

function toggleSelectAll() {
  const selectAllCheckbox = document.getElementById('selectAll');
  
  if (selectAllCheckbox.checked) {
    currentData.forEach(row => selectedIds.add(row._idx));
  } else {
    currentData.forEach(row => selectedIds.delete(row._idx));
  }
  renderTable();
}

function updateBatchDeleteBtn() {
  const btn = document.getElementById('batchDeleteBtn');
  const count = document.getElementById('selectedCount');
  if (currentSheet === 'product' && selectedIds.size > 0) {
    btn.style.display = 'inline-flex';
    count.textContent = selectedIds.size;
  } else {
    btn.style.display = 'none';
  }
}

async function batchDelete() {
  if (selectedIds.size === 0) return;
  
  if (!confirm(`确定要删除选中的 ${selectedIds.size} 条记录吗？`)) return;
  
  const config = sheetConfig[currentSheet];
  // 按真实行号从大到小排序，删除时不会影响前面行的索引
  const indices = Array.from(selectedIds).sort((a, b) => b - a);
  
  try {
    for (const index of indices) {
      await fetch(API_BASE + config.api + `/${index}`, {
        method: 'DELETE'
      });
    }
    
    showToast(`成功删除 ${indices.length} 条记录`, 'success');
    selectedIds.clear();
    loadData();
  } catch (e) {
    showToast('批量删除失败', 'error');
  }
}

// 批量导入功能
function triggerImport() {
  const fileInput = document.getElementById('importFileInput');
  fileInput.click();
}

async function handleFileImport(input) {
  const file = input.files[0];
  if (!file) return;
  
  // 验证文件类型
  const validTypes = [
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    'application/vnd.ms-excel'
  ];
  const fileExt = file.name.split('.').pop().toLowerCase();
  if (!validTypes.includes(file.type) && !['xlsx', 'xls'].includes(fileExt)) {
    showToast('请上传 Excel 文件 (.xlsx 或 .xls)', 'error');
    input.value = '';
    return;
  }
  
  // 确认导入
  if (!confirm(`确定要导入文件 "${file.name}" 吗？\n\n注意：数据将追加到现有数据末尾。\n建议先备份数据！`)) {
    input.value = '';
    return;
  }
  
  const formData = new FormData();
  formData.append('file', file);
  
  const config = sheetConfig[currentSheet];
  // 从 api 路径中提取 sheet 类型
  const sheetType = config.api.split('/').pop();
  
  showToast('正在导入，请稍候...', 'info');
  
  try {
    const response = await fetch(`${API_BASE}/api/admin/import/${sheetType}`, {
      method: 'POST',
      body: formData
    });
    
    const result = await response.json();
    
    if (result.success) {
      showToast(`成功导入 ${result.count} 条数据`, 'success');
      loadData(); // 刷新数据
    } else {
      showToast('导入失败: ' + (result.message || '未知错误'), 'error');
    }
  } catch (e) {
    showToast('导入失败: ' + e.message, 'error');
  }
  
  // 清空文件输入，允许重复选择同一文件
  input.value = '';
}

// Modal
function openModal(isEdit = false) {
  const config = sheetConfig[currentSheet];
  document.getElementById('modalTitle').textContent = isEdit ? '编辑数据' : '新增数据';
  
  // 编辑时，通过 _idx 找到当前行
  const editRow = isEdit && editingId !== null
    ? currentData.find(r => r._idx === editingId) || {}
    : null;
  
  let html = '';
  config.columns.forEach(col => {
    const val = editRow ? (editRow[col.key] || '') : '';
    html += `
      <div class="form-group">
        <label>${col.label}</label>
        <input type="${col.type === 'number' ? 'number' : 'text'}" 
               id="field_${col.key}" 
               value="${val}" 
               ${col.type === 'number' ? 'step="0.01"' : ''}>
      </div>
    `;
  });
  
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  editingId = null;
}

// Edit Data
function editData(realIdx) {
  editingId = realIdx;
  openModal(true);
}

// Save Data
async function saveData() {
  const config = sheetConfig[currentSheet];
  const data = {};
  
  config.columns.forEach(col => {
    let val = document.getElementById(`field_${col.key}`).value;
    if (col.type === 'number') {
      val = parseFloat(val) || 0;
    }
    data[col.key] = val;
  });
  
  try {
    let url = API_BASE + config.api;
    let method = 'POST';
    
    if (editingId !== null) {
      url += `/${editingId}`;
      method = 'PUT';
    }
    
    const res = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    
    const result = await res.json();
    
    if (result.success) {
      showToast(editingId !== null ? '更新成功' : '新增成功', 'success');
      closeModal();
      loadData();
    } else {
      showToast(result.message || '保存失败', 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

// Delete Data
async function deleteData(index) {
  if (!confirm('确定要删除这条记录吗？')) return;
  
  const config = sheetConfig[currentSheet];
  
  try {
    const res = await fetch(API_BASE + config.api + `/${index}`, {
      method: 'DELETE'
    });
    
    const result = await res.json();
    
    if (result.success) {
      showToast('删除成功', 'success');
      loadData();
    } else {
      showToast(result.message || '删除失败', 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

// Toast
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type;
  toast.style.display = 'block';
  setTimeout(() => {
    toast.style.display = 'none';
  }, 3000);
}
</script>
