# HTTP → HTTPS 301 重定向
server {
    listen 80;
    server_name yiyang2026.top www.yiyang2026.top _;
    return 301 https://$host$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name yiyang2026.top www.yiyang2026.top;

    ssl_certificate     /etc/letsencrypt/live/yiyang2026.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yiyang2026.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # API 反向代理到后端
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:80;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 支持 WebSocket（SSE 流式响应）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
