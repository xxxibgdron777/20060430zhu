version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: financial-agent-backend
    env_file:
      - .env
    ports:
      - "8000:80"
    volumes:
      # 管理报表.xlsx 持久化（容器内为 /app/管理报表.xlsx）
      - ../管理报表.xlsx:/app/管理报表.xlsx:ro
      # VIP数据持久化
      - ./vip_data:/app/backend/data
      # 前端静态文件（用于 /static 挂载）
      - ../frontend:/app/frontend:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: financial-agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
      - /etc/letsencrypt/live/yiyang2026.top:/etc/letsencrypt/live/yiyang2026.top:ro
      - /etc/letsencrypt/archive/yiyang2026.top:/etc/letsencrypt/archive/yiyang2026.top:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vip_data:
