version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: financial-agent-backend
    ports:
      - "8000:80"
    volumes:
      # 管理报表.xlsx 持久化（容器内为 /app/管理报表.xlsx）
      - ../管理报表.xlsx:/app/管理报表.xlsx:ro
      # VIP数据持久化
      - ./vip_data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: financial-agent-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vip_data:
