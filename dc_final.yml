services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: financial-agent-backend
    expose:
      - "80"
    volumes:
      - ../管理报表.xlsx:/app/管理报表.xlsx:ro
      - ./vip_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: financial-agent-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vip_data:
